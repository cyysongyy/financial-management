<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人財務管理</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #252840;
    --accent: #6c63ff; --green: #43e97b; --red: #f5576c; --yellow: #ffd700;
    --text: #e2e8f0; --muted: #8892a4; --border: #2d3250; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 24px; position: sticky; top: 0; z-index: 100; height: 60px; }
  nav .logo { font-size: 1.2rem; font-weight: 700; color: var(--accent); margin-right: auto; }
  nav button { background: none; border: none; color: var(--muted); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: .9rem; transition: all .2s; }
  nav button.active, nav button:hover { background: var(--accent); color: #fff; }
  #nav-user { font-size: .78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  #btn-logout { color: var(--red) !important; border: 1px solid var(--red) !important; }
  #btn-logout:hover { background: var(--red) !important; color: #fff !important; }

  /* LAYOUT */
  main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
  .page { display: none; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card h3 { font-size: .85rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .card .value { font-size: 1.8rem; font-weight: 700; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }

  /* FORMS */
  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 12px; }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 14px; font-size: .9rem; width: 100%; outline: none; transition: border .2s; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 4px; }
  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: .9rem; font-weight: 600; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #574fd6; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 5px 10px; font-size: .78rem; border-radius: 6px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th { text-align: left; padding: 10px 14px; color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
  .badge-income { background: rgba(67,233,123,.15); color: var(--green); }
  .badge-expense { background: rgba(245,87,108,.15); color: var(--red); }

  /* PROGRESS */
  .progress-bar { background: var(--surface2); border-radius: 999px; height: 8px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width .4s; }

  /* CHART */
  .chart-box { position: relative; height: 260px; }

  /* DASHBOARD */
  .dash-gauge-wrap { display: flex; align-items: center; justify-content: center; position: relative; }
  .gauge-label { position: absolute; text-align: center; }
  .gauge-label .g-val { font-size: 1.5rem; font-weight: 700; }
  .gauge-label .g-sub { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  .dash-stat-row { display: flex; justify-content: space-around; margin-top: 12px; }
  .dash-stat .ds-val { font-size: 1.1rem; font-weight: 700; }
  .dash-stat .ds-label { font-size: .75rem; color: var(--muted); margin-top: 2px; text-align: center; }
  .tx-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .tx-item:last-child { border-bottom: none; }
  .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-info .ti-cat { font-size: .85rem; font-weight: 600; }
  .tx-info .ti-desc { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-right { text-align: right; flex-shrink: 0; }
  .tx-right .tr-amount { font-size: .9rem; font-weight: 700; }
  .tx-right .tr-date { font-size: .72rem; color: var(--muted); }

  /* STOCK */
  .stock-result { background: var(--surface2); border-radius: var(--radius); padding: 20px; margin-top: 16px; }
  .stock-result .profit { font-size: 2rem; font-weight: 700; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 460px; }
  .modal h2 { margin-bottom: 20px; }

  /* LOGIN SCREEN */
  #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 380px; }
  .login-box .login-logo { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
  .login-box h1 { text-align: center; font-size: 1.4rem; margin-bottom: 4px; }
  .login-box .login-sub { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 28px; }
  .login-box .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .login-box .tab { flex: 1; text-align: center; padding: 8px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); font-size: .9rem; transition: all .2s; }
  .login-box .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .login-field { margin-bottom: 14px; }
  .login-field label { font-size: .8rem; color: var(--muted); margin-bottom: 4px; display: block; }
  #login-error { color: var(--red); font-size: .82rem; min-height: 18px; margin-bottom: 10px; text-align: center; }
  .login-footer { text-align: center; margin-top: 16px; font-size: .78rem; color: var(--muted); }

  /* LOADING */
  #app-loading { position: fixed; inset: 0; background: var(--bg); z-index: 600; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MISC */
  .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
  .section-actions { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .income-val { color: var(--green); }
  .expense-val { color: var(--red); }
  .neutral-val { color: var(--yellow); }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }
  .filter-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-row select { width: auto; }
  .sync-badge { font-size: .72rem; background: rgba(67,233,123,.15); color: var(--green); border-radius: 6px; padding: 2px 7px; margin-left: 6px; }

  @media(max-width:600px){
    nav { padding: 0 12px; gap: 4px; }
    nav button { padding: 6px 10px; font-size: .8rem; }
    #nav-user { display: none; }
    .grid-4 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="app-loading">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:.9rem">連線中…</div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="login-logo">💰</div>
    <h1>個人財務管理</h1>
    <div class="login-sub">雲端同步・多裝置存取</div>
    <div class="tabs">
      <div class="tab active" onclick="switchAuthTab('login')">登入</div>
      <div class="tab" onclick="switchAuthTab('register')">註冊</div>
    </div>
    <div class="login-field">
      <label>電子信箱</label>
      <input type="email" id="auth-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div class="login-field">
      <label>密碼</label>
      <input type="password" id="auth-password" placeholder="至少 6 個字元" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div id="login-error"></div>
    <button class="btn btn-primary" id="auth-btn" onclick="doAuth()" style="width:100%">登入</button>
    <div class="login-footer">資料加密存放於 Google Firebase</div>
  </div>
</div>

<!-- NAV -->
<nav id="main-nav" style="display:none">
  <span class="logo">💰 財務管理</span>
  <button class="active" onclick="goPage('dashboard')">總覽</button>
  <button onclick="goPage('transactions')">收支</button>
  <button onclick="goPage('budget')">預算</button>
  <button onclick="goPage('charts')">圖表</button>
  <button onclick="goPage('stock')">股票</button>
  <span class="sync-badge">☁ 雲端同步</span>
  <span id="nav-user"></span>
  <span id="nav-date" style="font-size:.78rem;color:var(--muted);white-space:nowrap"></span>
  <button id="btn-logout" class="btn-outline btn-sm btn" onclick="doLogout()">登出</button>
</nav>

<main id="main-content" style="display:none">

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <div class="grid-4" id="summary-cards"></div>
  <div class="grid-2" style="margin-bottom:20px">
    <div class="card">
      <div class="section-title">本月收支儀錶板</div>
      <div class="dash-gauge-wrap" style="height:200px">
        <canvas id="dash-donut" style="max-height:200px"></canvas>
        <div class="gauge-label">
          <div class="g-val" id="dash-gauge-val">—</div>
          <div class="g-sub">結餘</div>
        </div>
      </div>
      <div class="dash-stat-row">
        <div class="dash-stat"><div class="ds-val income-val" id="ds-income">$0</div><div class="ds-label">收入</div></div>
        <div class="dash-stat"><div class="ds-val expense-val" id="ds-expense">$0</div><div class="ds-label">支出</div></div>
        <div class="dash-stat"><div class="ds-val neutral-val" id="ds-balance">$0</div><div class="ds-label">結餘</div></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">近 6 個月趨勢</div>
      <div class="chart-box" style="height:260px"><canvas id="dash-bar"></canvas></div>
    </div>
  </div>
  <div class="grid-2">
    <div class="card"><div class="section-title">本月最近收支</div><div id="dash-recent"></div></div>
    <div class="card"><div class="section-title">預算使用狀況</div><div id="dash-budget"></div></div>
  </div>
</div>

<!-- TRANSACTIONS -->
<div id="page-transactions" class="page">
  <div class="section-actions">
    <span class="section-title" style="margin:0">收支紀錄</span>
    <button class="btn btn-primary" onclick="openModal()">＋ 新增</button>
    <button class="btn btn-outline btn-sm" onclick="exportCSV()">匯出 CSV</button>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
      <select id="filter-month" onchange="renderTransactions()"><option value="">全部月份</option></select>
      <select id="filter-cat" onchange="renderTransactions()"><option value="">全部類別</option></select>
      <select id="filter-type" onchange="renderTransactions()">
        <option value="">全部類型</option>
        <option value="income">收入</option>
        <option value="expense">支出</option>
      </select>
    </div>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>日期</th><th>類別</th><th>說明</th><th>類型</th><th>金額</th><th></th></tr></thead>
        <tbody id="tx-tbody"></tbody>
      </table>
    </div>
    <div id="tx-empty" class="empty" style="display:none">尚無紀錄</div>
  </div>
</div>

<!-- BUDGET -->
<div id="page-budget" class="page">
  <div class="section-actions">
    <span class="section-title" style="margin:0">預算管理</span>
    <button class="btn btn-primary" onclick="openBudgetModal()">＋ 設定預算</button>
  </div>
  <div id="budget-list" class="grid-2"></div>
  <div id="budget-empty" class="empty" style="display:none">尚未設定任何預算</div>
</div>

<!-- CHARTS -->
<div id="page-charts" class="page">
  <div class="filter-row">
    <label style="margin:0;white-space:nowrap">篩選月份</label>
    <select id="chart-month" onchange="renderCharts()"><option value="">全部</option></select>
  </div>
  <div class="grid-2" style="margin-bottom:20px">
    <div class="card"><div class="section-title">支出分類佔比</div><div class="chart-box"><canvas id="pie-chart"></canvas></div></div>
    <div class="card"><div class="section-title">收入分類佔比</div><div class="chart-box"><canvas id="pie-income-chart"></canvas></div></div>
  </div>
  <div class="card"><div class="section-title">月度收支趨勢</div><div class="chart-box" style="height:300px"><canvas id="bar-chart"></canvas></div></div>
</div>

<!-- STOCK -->
<div id="page-stock" class="page">
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-weight:700">📈 台股投資儀錶板</span>
        <span id="stock-iframe-status" style="font-size:.75rem;color:var(--muted)">載入中…</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="reloadStockFrame()">🔄 重新整理</button>
        <a href="https://cyysongyy.github.io/stock/" target="_blank" class="btn btn-outline btn-sm" style="text-decoration:none">↗ 開新分頁</a>
      </div>
    </div>
    <iframe id="stock-iframe" src="https://cyysongyy.github.io/stock/#name=cyy1204"
      style="width:100%;height:680px;border:none;display:block"
      onload="document.getElementById('stock-iframe-status').textContent='已連線・自動更新中'"
    ></iframe>
  </div>
  <div class="section-title">潛在獲利計算器</div>
  <div class="grid-2">
    <div class="card">
      <div class="form-row">
        <div><label>股票名稱／代號</label><input id="s-name" type="text" placeholder="例：台積電 2330"></div>
        <div><label>買入股數</label><input id="s-shares" type="number" placeholder="例：1000" min="1"></div>
      </div>
      <div class="form-row">
        <div><label>買入價格（元）</label><input id="s-buy" type="number" placeholder="例：500" step="0.01" min="0"></div>
        <div><label>目前／目標價格（元）</label><input id="s-target" type="number" placeholder="例：600" step="0.01" min="0"></div>
      </div>
      <div class="form-row">
        <div><label>手續費率（%，買賣各）</label><input id="s-fee" type="number" value="0.1425" step="0.0001" min="0"></div>
        <div><label>交易稅率（%，賣出）</label><input id="s-tax" type="number" value="0.3" step="0.001" min="0"></div>
      </div>
      <button class="btn btn-primary" onclick="calcStock()" style="width:100%;margin-top:8px">計算獲利</button>
    </div>
    <div>
      <div id="stock-result"></div>
      <div class="card" style="margin-top:16px">
        <div class="section-title">計算紀錄</div>
        <div style="margin-bottom:12px"><button class="btn btn-outline btn-sm" onclick="saveStock()">儲存此計算</button></div>
        <div id="stock-list"></div>
      </div>
    </div>
  </div>
</div>

</main>

<!-- ADD TRANSACTION MODAL -->
<div class="modal-overlay" id="tx-modal">
  <div class="modal">
    <h2 id="modal-title">新增收支</h2>
    <div class="form-row">
      <div><label>日期</label><input type="date" id="tx-date"></div>
      <div><label>類型</label><select id="tx-type" onchange="updateCatOptions()"><option value="expense">支出</option><option value="income">收入</option></select></div>
    </div>
    <div class="form-row">
      <div><label>類別</label><select id="tx-cat"></select></div>
      <div><label>金額（元）</label><input type="number" id="tx-amount" placeholder="0" min="0" step="0.01"></div>
    </div>
    <div style="margin-bottom:16px"><label>說明</label><input type="text" id="tx-desc" placeholder="備註（可省略）"></div>
    <div style="margin-bottom:16px;padding:14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)" id="recurring-section">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:0">
        <input type="checkbox" id="tx-recurring" onchange="toggleRecurring()" style="width:16px;height:16px;accent-color:var(--accent)">
        <span style="font-size:.9rem;color:var(--text)">經常性支出（每月自動建立）</span>
      </label>
      <div id="recurring-fields" style="display:none;margin-top:12px">
        <div class="form-row" style="margin-bottom:0">
          <div><label>開始月份</label><input type="month" id="tx-recur-start"></div>
          <div><label>結束月份</label><input type="month" id="tx-recur-end"></div>
        </div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:8px">將在指定範圍內每個月的同一天各建立一筆支出紀錄</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveTx()">儲存</button>
    </div>
  </div>
</div>

<!-- BUDGET MODAL -->
<div class="modal-overlay" id="budget-modal">
  <div class="modal">
    <h2>設定預算</h2>
    <div class="form-row">
      <div><label>類別</label><select id="bud-cat"></select></div>
      <div><label>月份</label><input type="month" id="bud-month"></div>
    </div>
    <div style="margin-bottom:16px"><label>預算金額（元）</label><input type="number" id="bud-amount" placeholder="例：10000" min="0"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeBudgetModal()">取消</button>
      <button class="btn btn-primary" onclick="saveBudget()">儲存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ⚠️  請填入你的 Firebase 設定（到 console.firebase.google.com 取得）

const COLORS = ['#6c63ff','#ff6584','#43e97b','#ffd700','#00c6ff','#f093fb','#4facfe','#f5576c','#43e97b','#fa709a'];
const CAT_ICONS = {
  '餐飲':'🍜','交通':'🚌','購物':'🛍️','娛樂':'🎮','醫療':'💊','住房':'🏠','教育':'📚','保險':'🛡️','其他支出':'📦',
  '薪資':'💼','獎金':'🎁','投資收益':'📈','兼職':'🔧','其他收入':'💡'
};

let txs = [], budgets = [], stocks = [];
let editId = null;
let currentUid = null;
let unsubTxs, unsubBudgets, unsubStocks;

// ===== FIRESTORE HELPERS =====
function userCol(col) {
  return db.collection('users').doc(currentUid).collection(col);
}

async function fbSet(col, id, data) {
  await userCol(col).doc(id).set(data);
}

async function fbDelete(col, id) {
  await userCol(col).doc(id).delete();
}

function listenAll() {
  unsubTxs = userCol('transactions').onSnapshot(snap => {
    txs = snap.docs.map(d => d.data());
    renderDashboard();
    renderTransactions();
    populateFilters();
  });
  unsubBudgets = userCol('budgets').onSnapshot(snap => {
    budgets = snap.docs.map(d => d.data());
    renderBudgets();
    renderDashboard();
  });
  unsubStocks = userCol('stocks').onSnapshot(snap => {
    stocks = snap.docs.map(d => d.data());
    renderStockList();
  });
}

function unlistenAll() {
  if (unsubTxs) unsubTxs();
  if (unsubBudgets) unsubBudgets();
  if (unsubStocks) unsubStocks();
  txs = []; budgets = []; stocks = [];
}

// ===== AUTH =====
let authTab = 'login';

function switchAuthTab(tab) {
  authTab = tab;
  document.querySelectorAll('.login-box .tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('auth-btn').textContent = tab === 'login' ? '登入' : '建立帳號';
  document.getElementById('login-error').textContent = '';
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = '請填寫信箱與密碼'; return; }
  try {
    if (authTab === 'login') {
      await auth.signInWithEmailAndPassword(email, pass);
    } else {
      await auth.createUserWithEmailAndPassword(email, pass);
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found': '找不到此帳號',
      'auth/wrong-password': '密碼錯誤',
      'auth/email-already-in-use': '此信箱已被使用',
      'auth/invalid-email': '信箱格式不正確',
      'auth/weak-password': '密碼至少需要 6 個字元',
      'auth/invalid-credential': '信箱或密碼錯誤',
    };
    errEl.textContent = msgs[e.code] || e.message;
  }
}

async function doLogout() {
  unlistenAll();
  await auth.signOut();
}

// ===== AUTH STATE LISTENER =====
auth.onAuthStateChanged(user => {
  document.getElementById('app-loading').style.display = 'none';
  if (user) {
    currentUid = user.uid;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('nav-user').textContent = user.email;
    listenAll();
    goPage('dashboard');
  } else {
    currentUid = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-nav').style.display = 'none';
    document.getElementById('main-content').style.display = 'none';
  }
});

// ===== NAV =====
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const pages = ['dashboard','transactions','budget','charts','stock'];
  const idx = pages.indexOf(id);
  if (idx >= 0) document.querySelectorAll('nav button')[idx].classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'transactions') { populateFilters(); renderTransactions(); }
  if (id === 'budget') renderBudgets();
  if (id === 'charts') renderCharts();
  if (id === 'stock') { renderStockList(); startStockAutoRefresh(); }
  else stopStockAutoRefresh();
}

// ===== UTILS =====
function fmt(n) { return new Intl.NumberFormat('zh-TW').format(Math.round(n)); }
function today() { return new Date().toISOString().slice(0,10); }
function monthOf(d) { return d.slice(0,7); }
function currentMonth() { return today().slice(0,7); }
function allMonths() { return [...new Set(txs.map(t=>monthOf(t.date)))].sort().reverse(); }

// ===== DASHBOARD =====
let dashDonutChart, dashBarChart;

function renderDashboard() {
  const m = currentMonth();
  const mTxs = txs.filter(t => monthOf(t.date) === m);
  const income = mTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = mTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  document.getElementById('summary-cards').innerHTML = `
    <div class="card"><h3>本月收入</h3><div class="value income-val">$${fmt(income)}</div></div>
    <div class="card"><h3>本月支出</h3><div class="value expense-val">$${fmt(expense)}</div></div>
    <div class="card"><h3>本月結餘</h3><div class="value ${balance>=0?'income-val':'expense-val'}">$${fmt(balance)}</div></div>
    <div class="card"><h3>本月儲蓄率</h3><div class="value neutral-val">${income>0?Math.round(balance/income*100):0}%</div></div>
  `;

  document.getElementById('ds-income').textContent = '$'+fmt(income);
  document.getElementById('ds-expense').textContent = '$'+fmt(expense);
  document.getElementById('ds-balance').textContent = (balance>=0?'+':'')+'$'+fmt(balance);
  document.getElementById('ds-balance').style.color = balance>=0?'var(--green)':'var(--red)';
  document.getElementById('dash-gauge-val').textContent = (balance>=0?'+':'')+'$'+fmt(balance);
  document.getElementById('dash-gauge-val').style.color = balance>=0?'var(--green)':'var(--red)';

  if (dashDonutChart) dashDonutChart.destroy();
  const hasData = income>0||expense>0;
  dashDonutChart = new Chart(document.getElementById('dash-donut'), {
    type:'doughnut',
    data:{ labels:['收入','支出'], datasets:[{
      data: hasData?[income,expense]:[1,1],
      backgroundColor: hasData?['rgba(67,233,123,.85)','rgba(245,87,108,.85)']:['rgba(255,255,255,.05)','rgba(255,255,255,.05)'],
      borderColor:'#0f1117', borderWidth:3
    }]},
    options:{ cutout:'72%', plugins:{ legend:{display:false}, tooltip:{enabled:hasData} }, animation:{animateRotate:true,duration:700} }
  });

  const now = new Date();
  const last6 = Array.from({length:6},(_,i)=>{
    const d = new Date(now.getFullYear(), now.getMonth()-5+i, 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });
  if (dashBarChart) dashBarChart.destroy();
  dashBarChart = new Chart(document.getElementById('dash-bar'), {
    type:'bar',
    data:{ labels:last6.map(m=>m.slice(5)+'月'), datasets:[
      { label:'收入', data:last6.map(mo=>txs.filter(t=>monthOf(t.date)===mo&&t.type==='income').reduce((s,t)=>s+t.amount,0)), backgroundColor:'rgba(67,233,123,.75)', borderRadius:6 },
      { label:'支出', data:last6.map(mo=>txs.filter(t=>monthOf(t.date)===mo&&t.type==='expense').reduce((s,t)=>s+t.amount,0)), backgroundColor:'rgba(245,87,108,.75)', borderRadius:6 }
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#8892a4',font:{size:11}}}},
      scales:{ x:{ticks:{color:'#8892a4'},grid:{color:'rgba(255,255,255,.04)'}}, y:{ticks:{color:'#8892a4',callback:v=>'$'+fmt(v)},grid:{color:'rgba(255,255,255,.04)'}} }
    }
  });

  const recent = [...mTxs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);
  document.getElementById('dash-recent').innerHTML = recent.length ? recent.map(t => {
    const icon = CAT_ICONS[t.cat]||(t.type==='income'?'💰':'💸');
    const bg = t.type==='income'?'rgba(67,233,123,.12)':'rgba(245,87,108,.12)';
    return `<div class="tx-item">
      <div class="tx-icon" style="background:${bg}">${icon}</div>
      <div class="tx-info"><div class="ti-cat">${t.cat}</div><div class="ti-desc">${t.desc||'—'}</div></div>
      <div class="tx-right">
        <div class="tr-amount ${t.type==='income'?'income-val':'expense-val'}">${t.type==='income'?'+':'-'}$${fmt(t.amount)}</div>
        <div class="tr-date">${t.date}</div>
      </div>
    </div>`;
  }).join('') : '<div class="empty">尚無紀錄</div>';

  const mBudgets = budgets.filter(b=>b.month===m);
  document.getElementById('dash-budget').innerHTML = mBudgets.length ? mBudgets.map(b => {
    const spent = mTxs.filter(t=>t.type==='expense'&&t.cat===b.cat).reduce((s,t)=>s+t.amount,0);
    const pct = Math.min(100,Math.round(spent/b.amount*100));
    const color = pct>90?'var(--red)':pct>70?'var(--yellow)':'var(--green)';
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:.85rem"><span>${b.cat}</span><span style="color:var(--muted)">$${fmt(spent)} / $${fmt(b.amount)}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('') : '<div class="empty">尚未設定本月預算</div>';
}

// ===== TRANSACTIONS =====
function populateFilters() {
  const cur = currentMonth();
  const months = [...new Set(txs.map(t=>monthOf(t.date)))]
    .filter(m => m >= cur)
    .sort();
  const fm = document.getElementById('filter-month');
  const prevVal = fm.value;
  fm.innerHTML = '<option value="">全部月份</option>' + months.map(m=>`<option value="${m}">${m}</option>`).join('');
  // 預設選本月，若已有選擇則保留
  fm.value = prevVal || cur;
  const allCats = [...new Set(txs.map(t=>t.cat))].sort();
  document.getElementById('filter-cat').innerHTML = '<option value="">全部類別</option>' + allCats.map(c=>`<option>${c}</option>`).join('');
  const cm = document.getElementById('chart-month');
  cm.innerHTML = '<option value="">全部</option>' + months.map(m=>`<option value="${m}">${m}</option>`).join('');
}

function renderTransactions() {
  const fm = document.getElementById('filter-month').value;
  const fc = document.getElementById('filter-cat').value;
  const ft = document.getElementById('filter-type').value;
  let data = [...txs].sort((a,b)=>a.date.localeCompare(b.date));
  if (fm) {
    data = data.filter(t=>monthOf(t.date)===fm);
  } else {
    // 全部月份：顯示本月以後
    data = data.filter(t=>monthOf(t.date)>=currentMonth());
  }
  if (fc) data = data.filter(t=>t.cat===fc);
  if (ft) data = data.filter(t=>t.type===ft);
  const tbody = document.getElementById('tx-tbody');
  const empty = document.getElementById('tx-empty');
  if (!data.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = data.map(t=>`
    <tr>
      <td>${t.date}</td><td>${t.cat}</td>
      <td style="color:var(--muted)">${t.desc||'—'}</td>
      <td><span class="badge badge-${t.type}">${t.type==='income'?'收入':'支出'}</span></td>
      <td class="${t.type==='income'?'income-val':'expense-val'}" style="font-weight:700">${t.type==='income'?'+':'-'}$${fmt(t.amount)}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="editTx('${t.id}')">編輯</button>
        <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="deleteTx('${t.id}')">刪除</button>
      </td>
    </tr>`).join('');
}

function openModal(id=null) {
  editId=id;
  document.getElementById('modal-title').textContent=id?'編輯收支':'新增收支';
  document.getElementById('tx-recurring').checked=false;
  document.getElementById('recurring-fields').style.display='none';
  document.getElementById('recurring-section').style.display = id ? 'none' : 'block';
  if(id){ const t=txs.find(x=>x.id===id); document.getElementById('tx-date').value=t.date; document.getElementById('tx-type').value=t.type; updateCatOptions(); document.getElementById('tx-cat').value=t.cat; document.getElementById('tx-amount').value=t.amount; document.getElementById('tx-desc').value=t.desc||''; }
  else { document.getElementById('tx-date').value=today(); document.getElementById('tx-type').value='expense'; updateCatOptions(); document.getElementById('tx-amount').value=''; document.getElementById('tx-desc').value='';
    const m=currentMonth(); document.getElementById('tx-recur-start').value=m; document.getElementById('tx-recur-end').value=m; }
  document.getElementById('tx-modal').classList.add('open');
}
function toggleRecurring(){
  document.getElementById('recurring-fields').style.display=document.getElementById('tx-recurring').checked?'block':'none';
}
function closeModal(){ document.getElementById('tx-modal').classList.remove('open'); }
function updateCatOptions(){ const type=document.getElementById('tx-type').value; document.getElementById('tx-cat').innerHTML=(type==='income'?INCOME_CATS:EXPENSE_CATS).map(c=>`<option>${c}</option>`).join(''); }

async function saveTx() {
  const date=document.getElementById('tx-date').value, type=document.getElementById('tx-type').value,
        cat=document.getElementById('tx-cat').value, amount=parseFloat(document.getElementById('tx-amount').value),
        desc=document.getElementById('tx-desc').value.trim();
  if(!date||!cat||!amount||amount<=0){alert('請填寫必要欄位');return;}
  const isRecurring=!editId&&document.getElementById('tx-recurring').checked;
  if(isRecurring){
    const startM=document.getElementById('tx-recur-start').value;
    const endM=document.getElementById('tx-recur-end').value;
    if(!startM||!endM||endM<startM){alert('請設定正確的開始/結束月份');return;}
    const day=date.slice(8); // keep same day of month
    const months=[];
    let cur=new Date(startM+'-01');
    const end=new Date(endM+'-01');
    while(cur<=end){
      const y=cur.getFullYear(), mo=String(cur.getMonth()+1).padStart(2,'0');
      // clamp day to last day of month
      const maxDay=new Date(y,cur.getMonth()+1,0).getDate();
      const d=String(Math.min(parseInt(day),maxDay)).padStart(2,'0');
      months.push(`${y}-${mo}-${d}`);
      cur.setMonth(cur.getMonth()+1);
    }
    const recurId='recur-'+Date.now().toString();
    const saves=months.map((dt,i)=>{
      const id=Date.now().toString()+(i*37);
      return fbSet('transactions',id,{id,date:dt,type,cat,amount,desc,recurId});
    });
    await Promise.all(saves);
    closeModal();
    alert(`已建立 ${months.length} 筆經常性支出（${startM} ～ ${endM}）`);
    return;
  }
  const id = editId || Date.now().toString();
  await fbSet('transactions', id, {id,date,type,cat,amount,desc});
  closeModal();
}

function editTx(id){ openModal(id); }
async function deleteTx(id){ if(!confirm('確定刪除？'))return; await fbDelete('transactions',id); }

function exportCSV() {
  const rows=[['日期','類型','類別','說明','金額']];
  [...txs].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>rows.push([t.date,t.type==='income'?'收入':'支出',t.cat,t.desc||'',t.amount]));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='財務紀錄.csv';a.click();URL.revokeObjectURL(url);
}

function openBudgetModal(){ document.getElementById('bud-cat').innerHTML=EXPENSE_CATS.map(c=>`<option>${c}</option>`).join(''); document.getElementById('bud-month').value=currentMonth(); document.getElementById('bud-amount').value=''; document.getElementById('budget-modal').classList.add('open'); }
function closeBudgetModal(){ document.getElementById('budget-modal').classList.remove('open'); }

async function saveBudget() {
  const cat=document.getElementById('bud-cat').value, month=document.getElementById('bud-month').value, amount=parseFloat(document.getElementById('bud-amount').value);
  if(!cat||!month||!amount||amount<=0){alert('請填寫必要欄位');return;}
  const existing=budgets.find(b=>b.cat===cat&&b.month===month);
  const id=existing?existing.id:Date.now().toString();
  await fbSet('budgets',id,{id,cat,month,amount});
  closeBudgetModal();
}

function renderBudgets() {
  const m=currentMonth();
  const mTxs=txs.filter(t=>monthOf(t.date)===m&&t.type==='expense');
  const empty=document.getElementById('budget-empty'), list=document.getElementById('budget-list');
  if(!budgets.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=[...budgets].sort((a,b)=>b.month.localeCompare(a.month)).map(b=>{
    const spent=txs.filter(t=>t.type==='expense'&&t.cat===b.cat&&monthOf(t.date)===b.month).reduce((s,t)=>s+t.amount,0);
    const pct=Math.min(100,Math.round(spent/b.amount*100));
    const color=pct>90?'var(--red)':pct>70?'var(--yellow)':'var(--green)';
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-weight:700">${b.cat} <span style="color:var(--muted);font-size:.8rem;font-weight:400">${b.month}</span></div>
        <button class="btn btn-danger btn-sm" onclick="deleteBudget('${b.id}')">刪除</button>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px">
        <span style="color:var(--muted)">已使用 <b>$${fmt(spent)}</b></span>
        <span style="color:var(--muted)">預算 <b>$${fmt(b.amount)}</b></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <div style="font-size:.8rem;color:${color};margin-top:6px;text-align:right">${pct}% 已使用　剩餘 $${fmt(Math.max(0,b.amount-spent))}</div>
    </div>`;
  }).join('');
}

let pieChart,pieIncomeChart,barChart;

function renderCharts() {
  const m=document.getElementById('chart-month').value;
  let data=m?txs.filter(t=>monthOf(t.date)===m):txs;
  const expenses=data.filter(t=>t.type==='expense'), incomes=data.filter(t=>t.type==='income');
  const expMap={},incMap={};
  expenses.forEach(t=>{expMap[t.cat]=(expMap[t.cat]||0)+t.amount;});
  incomes.forEach(t=>{incMap[t.cat]=(incMap[t.cat]||0)+t.amount;});
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById('pie-chart'),{type:'doughnut',data:{labels:Object.keys(expMap),datasets:[{data:Object.values(expMap),backgroundColor:COLORS,borderColor:'var(--bg)',borderWidth:2}]},options:{plugins:{legend:{position:'right',labels:{color:'#8892a4',font:{size:11}}}},cutout:'60%'}});
  if(pieIncomeChart)pieIncomeChart.destroy();
  pieIncomeChart=new Chart(document.getElementById('pie-income-chart'),{type:'doughnut',data:{labels:Object.keys(incMap),datasets:[{data:Object.values(incMap),backgroundColor:COLORS.slice(4),borderColor:'var(--bg)',borderWidth:2}]},options:{plugins:{legend:{position:'right',labels:{color:'#8892a4',font:{size:11}}}},cutout:'60%'}});
  const monthMap={};
  txs.forEach(t=>{const mo=monthOf(t.date);if(!monthMap[mo])monthMap[mo]={income:0,expense:0};monthMap[mo][t.type]+=t.amount;});
  const months=Object.keys(monthMap).sort();
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('bar-chart'),{type:'bar',data:{labels:months,datasets:[{label:'收入',data:months.map(mo=>monthMap[mo].income),backgroundColor:'rgba(67,233,123,.7)',borderRadius:6},{label:'支出',data:months.map(mo=>monthMap[mo].expense),backgroundColor:'rgba(245,87,108,.7)',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8892a4'}}},scales:{x:{ticks:{color:'#8892a4'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#8892a4',callback:v=>'$'+fmt(v)},grid:{color:'rgba(255,255,255,.05)'}}}}});
}

// ===== STOCK CALC =====
function calcStock() {
  const name=document.getElementById('s-name').value||'未命名';
  const shares=parseFloat(document.getElementById('s-shares').value);
  const buy=parseFloat(document.getElementById('s-buy').value);
  const target=parseFloat(document.getElementById('s-target').value);
  const feeRate=parseFloat(document.getElementById('s-fee').value)/100;
  const taxRate=parseFloat(document.getElementById('s-tax').value)/100;
  if(!shares||!buy||!target){alert('請填寫股數與價格');return;}
  const cost=buy*shares, buyFee=cost*feeRate, proceeds=target*shares;
  const sellFee=proceeds*feeRate, sellTax=proceeds*taxRate;
  const totalCost=cost+buyFee, netProceeds=proceeds-sellFee-sellTax;
  const profit=netProceeds-totalCost, pctReturn=(profit/totalCost)*100;
  const isProfit=profit>=0;
  document.getElementById('stock-result').innerHTML=`
    <div class="stock-result card">
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:4px">${name}</div>
      <div class="profit ${isProfit?'income-val':'expense-val'}">${isProfit?'+':''} $${fmt(Math.abs(profit))}</div>
      <div style="font-size:.9rem;color:var(--muted);margin-top:4px">${pctReturn>=0?'+':''}${pctReturn.toFixed(2)}% 報酬率</div>
      <hr style="border-color:var(--border);margin:14px 0">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:.85rem">
        <div><div style="color:var(--muted)">買入成本</div><div style="font-weight:600">$${fmt(totalCost)}</div></div>
        <div><div style="color:var(--muted)">賣出淨收</div><div style="font-weight:600">$${fmt(netProceeds)}</div></div>
        <div><div style="color:var(--muted)">買入手續費</div><div>$${fmt(buyFee)}</div></div>
        <div><div style="color:var(--muted)">賣出手續費</div><div>$${fmt(sellFee)}</div></div>
        <div><div style="color:var(--muted)">交易稅</div><div>$${fmt(sellTax)}</div></div>
        <div><div style="color:var(--muted)">損益</div><div style="${isProfit?'color:var(--green)':'color:var(--red)'}">$${fmt(Math.abs(profit))}</div></div>
      </div>
    </div>`;
  window._lastCalc={name,shares,buy,target,profit,pctReturn,feeRate:feeRate*100,taxRate:taxRate*100};
}

async function saveStock() {
  if(!window._lastCalc){alert('請先進行計算');return;}
  const id=Date.now().toString();
  await fbSet('stocks',id,{id,date:today(),...window._lastCalc});
}

function renderStockList() {
  const el=document.getElementById('stock-list');
  if(!stocks.length){el.innerHTML='<div class="empty">尚無紀錄</div>';return;}
  el.innerHTML=`<table><thead><tr><th>日期</th><th>股票</th><th>買入</th><th>目標</th><th>損益</th><th></th></tr></thead><tbody>
    ${[...stocks].sort((a,b)=>b.date.localeCompare(a.date)).map(s=>`
    <tr>
      <td style="font-size:.8rem;color:var(--muted)">${s.date}</td>
      <td>${s.name}<br><span style="font-size:.75rem;color:var(--muted)">${s.shares}股</span></td>
      <td>$${fmt(s.buy)}</td><td>$${fmt(s.target)}</td>
      <td class="${s.profit>=0?'income-val':'expense-val'}" style="font-weight:700">
        ${s.profit>=0?'+':''}$${fmt(s.profit)}<br><span style="font-size:.75rem;font-weight:400">${s.pctReturn>=0?'+':''}${s.pctReturn.toFixed(2)}%</span>
      </td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteStock('${s.id}')">刪</button></td>
    </tr>`).join('')}
  </tbody></table>`;
}

async function deleteStock(id){ stocks=stocks.filter(s=>s.id!==id); await fbDelete('stocks',id); renderStockList(); }

// ===== STOCK IFRAME =====
let stockRefreshTimer=null;
function reloadStockFrame(){ const f=document.getElementById('stock-iframe'); if(!f)return; document.getElementById('stock-iframe-status').textContent='更新中…'; f.src='https://cyysongyy.github.io/stock/#name=cyy1204'; }
function startStockAutoRefresh(){ if(stockRefreshTimer)clearInterval(stockRefreshTimer); stockRefreshTimer=setInterval(reloadStockFrame,5*60*1000); }
function stopStockAutoRefresh(){ if(stockRefreshTimer){clearInterval(stockRefreshTimer);stockRefreshTimer=null;} }

// ===== INIT =====
updateCatOptions();
(function updateNavDate(){
  const el = document.getElementById('nav-date');
  if(el){ const d=new Date(); el.textContent=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
  setTimeout(updateNavDate, 60000);
})();
</script>
