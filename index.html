<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人財務管理</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #252840;
    --accent: #6c63ff; --green: #43e97b; --border: #2d3250;
    --text: #e2e8f0; --muted: #8892a4; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  .logo { font-size: 3rem; margin-bottom: 12px; }
  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
  .sub { color: var(--muted); font-size: .95rem; margin-bottom: 48px; }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; max-width: 680px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 28px;
    text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; align-items: center; text-align: center;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(108,99,255,.2); }
  .card-icon { font-size: 2.8rem; margin-bottom: 16px; }
  .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
  .card-desc { font-size: .85rem; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  .card-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: .78rem; font-weight: 600; padding: 5px 14px;
    border-radius: 20px; margin-bottom: 6px;
  }
  .tag-cloud { background: rgba(108,99,255,.15); color: var(--accent); }
  .tag-local { background: rgba(67,233,123,.15); color: var(--green); }
  .card-features { list-style: none; font-size: .82rem; color: var(--muted); text-align: left; width: 100%; margin-top: 12px; }
  .card-features li { padding: 4px 0; }
  .card-features li::before { content: '✓ '; color: var(--accent); }
  .card-local .card-features li::before { color: var(--green); }

  .footer { margin-top: 40px; font-size: .78rem; color: var(--muted); }

  @media(max-width:560px){
    .cards { grid-template-columns: 1fr; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="logo">💰</div>
<h1>個人財務管理</h1>
<p class="sub">請選擇使用方式</p>

<div class="cards">
  <!-- 雲端版 -->
  <a class="card" href="cloud.html">
    <div class="card-icon">☁️</div>
    <div class="card-title">雲端版</div>
    <p class="card-desc">需要帳號登入，資料同步至 Google Firebase，隨時隨地多裝置存取。</p>
    <span class="card-tag tag-cloud">🔐 需要帳號</span>
    <ul class="card-features">
      <li>多裝置雲端同步</li>
      <li>資料不怕遺失</li>
      <li>即時更新</li>
      <li>台股投資儀錶板</li>
    </ul>
  </a>

  <!-- 單機版 -->
  <a class="card card-local" href="standalone.html">
    <div class="card-icon">💾</div>
    <div class="card-title">單機版</div>
    <p class="card-desc">無需帳號，資料存在本機瀏覽器，完全離線使用，隱私優先。</p>
    <span class="card-tag tag-local">🔓 免帳號登入</span>
    <ul class="card-features">
      <li>無需網路、完全離線</li>
      <li>不需要帳號密碼</li>
      <li>隱私資料不上傳</li>
      <li>股票盈餘手動記錄</li>
    </ul>
  </a>
</div>

<p class="footer">資料存放安全・個人使用</p>

</body>
</html>
